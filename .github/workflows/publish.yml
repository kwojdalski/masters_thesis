name: Publish Thesis to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      render_pdf:
        type: boolean
        description: Force PDF render from source (installs LaTeX, slow)
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect source changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE "thesis/qmd/src/.*\.(qmd|py)$"; then
            echo "qmd_changed=true" >> $GITHUB_OUTPUT
          else
            echo "qmd_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: ${{ steps.changes.outputs.qmd_changed == 'true' || github.event.inputs.render_pdf == 'true' }}

      - name: Install LaTeX packages
        if: steps.changes.outputs.qmd_changed == 'true' || github.event.inputs.render_pdf == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-science pdf2svg

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          pip install pandas numpy matplotlib pillow ipython jupyter scipy scikit-learn jinja2
          python -m ipykernel install --user --name masters_thesis --display-name "Masters Thesis"

      - name: Render thesis to HTML
        run: |
          quarto render thesis/qmd/src/masters-thesis.qmd --to html
          mkdir -p _site
          cp thesis/qmd/src/masters-thesis.html _site/index.html
          cp -r thesis/qmd/src/masters-thesis_files _site/
          mkdir -p _site/diagrams
          cp thesis/qmd/src/diagrams/*.svg _site/diagrams/
        env:
          PYTHONPATH: ${{ github.workspace }}/thesis/qmd/src

      - name: Render thesis to PDF
        if: steps.changes.outputs.qmd_changed == 'true' || github.event.inputs.render_pdf == 'true'
        run: |
          quarto render thesis/qmd/src/masters-thesis.qmd --to pdf
        env:
          PYTHONPATH: ${{ github.workspace }}/thesis/qmd/src
          QUARTO_NO_CHROME: "1"

      - name: Copy PDF to site
        run: |
          # Use freshly rendered PDF if available, otherwise fall back to committed one
          if [ -f "thesis/qmd/src/masters_thesis.pdf" ]; then
            echo "PDF file size: $(wc -c < thesis/qmd/src/masters_thesis.pdf) bytes"
            cp thesis/qmd/src/masters_thesis.pdf _site/masters_thesis.pdf
          else
            echo "ERROR: no PDF found"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
