name: Publish Thesis to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install xelatex and LaTeX packages
        run: |
          # Install xelatex and required LaTeX packages
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-science

      - name: Verify LaTeX installation
        run: |
          # Check if xelatex is available
          which xelatex
          xelatex --version
          # Check if pdflatex is available as fallback
          which pdflatex || echo "pdflatex not found"

      - name: Disable Chrome for PDF generation
        run: |
          # Disable Chrome/Chromium to prevent headless issues in CI
          export QUARTO_NO_CHROME=1
          export QUARTO_PANDOC_ARGS=--pdf-engine=xelatex
          echo "QUARTO_NO_CHROME=1" >> $GITHUB_ENV

      - name: Install pdf2svg
        run: sudo apt-get install -y pdf2svg

      - name: Install Python dependencies for code execution
        run: |
          pip install pandas numpy matplotlib pillow ipython jupyter

      - name: Render thesis to HTML
        run: |
          quarto render thesis/qmd/src/masters-thesis.qmd --to html
          mkdir -p _site
          cp thesis/qmd/src/masters-thesis.html _site/index.html
          cp -r thesis/qmd/src/masters-thesis_files _site/
          mkdir -p _site/diagrams
          cp thesis/qmd/src/diagrams/*.svg _site/diagrams/
        env:
          PYTHONPATH: ${{ github.workspace }}/thesis/qmd/src

      - name: Render thesis to PDF
        timeout-minutes: 15
        run: |
          echo "Starting PDF render at $(date)"

          # Check if the document exists
          if [ ! -f "thesis/qmd/src/masters-thesis.qmd" ]; then
            echo "ERROR: Thesis file not found!"
            exit 1
          fi

          # Set environment variables to prevent interactive prompts
          export TEXINPUTS=".:/usr/share/texmf/tex/latex//:"
          export OPENBLAS_NUM_THREADS=1
          export QUARTO_NO_CHROME=1

          # Determine which LaTeX engine to use
          if command -v xelatex &> /dev/null; then
            echo "Using xelatex for PDF generation"
            export QUARTO_PANDOC_ARGS=--pdf-engine=xelatex
          elif command -v pdflatex &> /dev/null; then
            echo "Using pdflatex as fallback for PDF generation"
            export QUARTO_PANDOC_ARGS=--pdf-engine=pdflatex
          else
            echo "ERROR: No LaTeX engine found (tried xelatex and pdflatex)"
            exit 1
          fi

          # Try rendering with more explicit flags and non-interactive mode
          quarto render thesis/qmd/src/masters-thesis.qmd --to pdf --no-execute --log-level debug || {
            echo "PDF render failed, checking for intermediate files..."
            ls -la thesis/qmd/src/ || true
            find thesis/qmd/src/ -name "*.pdf" -o -name "*.log" | head -20 || true
            exit 1
          }

          echo "PDF render completed at $(date)"

          # Verify PDF was created
          if [ ! -f "thesis/qmd/src/masters-thesis.pdf" ]; then
            echo "ERROR: PDF file was not created!"
            exit 1
          fi

          echo "PDF file size: $(wc -c < thesis/qmd/src/masters-thesis.pdf) bytes"
          cp thesis/qmd/src/masters-thesis.pdf _site/masters-thesis.pdf
        env:
          PYTHONPATH: ${{ github.workspace }}/thesis/qmd/src
          QUARTO_NO_CHROME: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
