name: Publish Thesis to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies for code execution
        run: |
          pip install pandas numpy matplotlib pillow ipython jupyter scipy scikit-learn jinja2
          python -m ipykernel install --user --name masters_thesis --display-name "Masters Thesis"

      - name: Render thesis to HTML
        run: |
          quarto render thesis/qmd/src/masters-thesis.qmd --to html
          mkdir -p _site
          cp thesis/qmd/src/masters-thesis.html _site/index.html
          cp -r thesis/qmd/src/masters-thesis_files _site/
          mkdir -p _site/diagrams
          cp thesis/qmd/src/diagrams/*.svg _site/diagrams/
        env:
          PYTHONPATH: ${{ github.workspace }}/thesis/qmd/src

      - name: Publish committed thesis PDF
        run: |
          if [ ! -f "thesis/qmd/src/masters_thesis.pdf" ]; then
            echo "ERROR: committed PDF not found at thesis/qmd/src/masters_thesis.pdf"
            exit 1
          fi

          echo "Using committed PDF artifact"
          echo "PDF file size: $(wc -c < thesis/qmd/src/masters_thesis.pdf) bytes"
          cp thesis/qmd/src/masters_thesis.pdf _site/masters_thesis.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
