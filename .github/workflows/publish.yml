name: Publish Thesis to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install xelatex and LaTeX packages
        run: |
          # Install xelatex and required LaTeX packages
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-science

      - name: Verify LaTeX installation
        run: |
          # Check if xelatex is available
          which xelatex
          xelatex --version
          # Check if pdflatex is available as fallback
          which pdflatex || echo "pdflatex not found"

      - name: Disable Chrome for PDF generation
        run: |
          # Disable Chrome/Chromium to prevent headless issues in CI
          export QUARTO_NO_CHROME=1
          export QUARTO_PANDOC_ARGS=--pdf-engine=xelatex
          echo "QUARTO_NO_CHROME=1" >> $GITHUB_ENV

      - name: Install pdf2svg
        run: sudo apt-get install -y pdf2svg

      - name: Install Python dependencies for code execution
        run: |
          pip install pandas numpy matplotlib pillow ipython jupyter scipy scikit-learn

      - name: Render thesis to HTML
        run: |
          quarto render thesis/qmd/src/masters-thesis.qmd --to html
          mkdir -p _site
          cp thesis/qmd/src/masters-thesis.html _site/index.html
          cp -r thesis/qmd/src/masters-thesis_files _site/
          mkdir -p _site/diagrams
          cp thesis/qmd/src/diagrams/*.svg _site/diagrams/
        env:
          PYTHONPATH: ${{ github.workspace }}/thesis/qmd/src

      - name: Publish committed thesis PDF
        run: |
          if [ ! -f "thesis/qmd/src/masters_thesis.pdf" ]; then
            echo "ERROR: committed PDF not found at thesis/qmd/src/masters_thesis.pdf"
            exit 1
          fi

          echo "Using committed PDF artifact"
          echo "PDF file size: $(wc -c < thesis/qmd/src/masters_thesis.pdf) bytes"
          cp thesis/qmd/src/masters_thesis.pdf _site/masters_thesis.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
