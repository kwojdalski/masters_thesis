features:
  # Mid-price log return: first difference of close (bid_px_00+ask_px_00)/2.
  # On autocorrelated data this is essentially the reward signal lagged one step,
  # making it the most informative possible feature for a log_return reward.
  - name: "close_vel"
    feature_type: "column_diff"
    params: {column: "close"}
    normalize: true
    domain: "hft"
