# Extended High-Frequency Trading (HFT) LOB Feature Set
# =====================================================
#
# This configuration starts from the baseline HFT LOB snapshot features and
# adds more event-driven alpha features implemented in `lob_features.py`.
#
# Core baseline:
# - Book pressure at L0-L2
# - Microprice and microprice divergence
# - Spread, multi-level imbalance, depth ratio, VWMP skew
# - Bid/ask slopes
# - Raw prices and sizes at L0-L2
#
# Additional alpha-oriented features:
# - Order flow imbalance (OFI) and rolling OFI horizons
# - Queue depletion on bid/ask
# - Mid-price acceleration
# - Log inter-event time
# - Spread regime ratio
# - Book convexity on bid/ask
# - Order count imbalance
# - Signed trade flow (cumulative delta proxy)
#
# Required columns:
#   bid_px_00..bid_px_09, ask_px_00..ask_px_09,
#   bid_sz_00..bid_sz_09, ask_sz_00..ask_sz_09
#
# Additional columns for extended features:
#   bid_ct_00..bid_ct_09, ask_ct_00..ask_ct_09,
#   action, side, size
#
# Index requirement:
#   DatetimeIndex (nanosecond precision preferred) for inter_event_time

features:
  # =============================================================================
  # Book Pressure Features (Volume Imbalance at Each Level)
  # =============================================================================

  - name: "hft_book_pressure_l0"
    feature_type: "book_pressure"
    normalize: true
    domain: "hft"
    params:
      level: 0

  - name: "hft_book_pressure_l1"
    feature_type: "book_pressure"
    normalize: true
    domain: "hft"
    params:
      level: 1

  - name: "hft_book_pressure_l2"
    feature_type: "book_pressure"
    normalize: true
    domain: "hft"
    params:
      level: 2

  # =============================================================================
  # Microprice and Fair Value Features
  # =============================================================================

  - name: "hft_microprice"
    feature_type: "microprice"
    normalize: true
    domain: "hft"
    params:
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"
      bid_size_col: "bid_sz_00"
      ask_size_col: "ask_sz_00"

  - name: "hft_microprice_divergence"
    feature_type: "microprice_divergence"
    normalize: true
    domain: "hft"
    params:
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"
      bid_size_col: "bid_sz_00"
      ask_size_col: "ask_sz_00"

  - name: "hft_mid_price_acceleration"
    feature_type: "mid_price_acceleration"
    normalize: true
    domain: "hft"
    params:
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"

  # =============================================================================
  # Spread and Cost Measures
  # =============================================================================

  - name: "hft_spread_bps"
    feature_type: "spread_bps"
    normalize: true
    domain: "hft"
    params:
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"

  - name: "hft_spread_ratio_50"
    feature_type: "spread_ratio"
    normalize: true
    domain: "hft"
    params:
      window: 50
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"

  - name: "hft_spread_ratio_200"
    feature_type: "spread_ratio"
    normalize: true
    domain: "hft"
    params:
      window: 200
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"

  # =============================================================================
  # Order Book Depth and Liquidity Features
  # =============================================================================

  - name: "hft_order_book_imbalance_3l"
    feature_type: "order_book_imbalance"
    normalize: true
    domain: "hft"
    params:
      levels: 3

  - name: "hft_depth_ratio"
    feature_type: "depth_ratio"
    normalize: true
    domain: "hft"
    params:
      levels_deep: 4

  - name: "hft_vwmp_skew"
    feature_type: "vwmp_skew"
    normalize: true
    domain: "hft"
    params:
      levels: 3

  # Volume Adjusted Mid Price — volume-weighted fair value (SSRN: 4351947)
  - name: "hft_price_vamp_1k"
    feature_type: "price_vamp"
    normalize: true
    domain: "hft"
    params:
      levels: 5
      notional: 1000

  - name: "hft_price_vamp_5k"
    feature_type: "price_vamp"
    normalize: true
    domain: "hft"
    params:
      levels: 5
      notional: 5000

  - name: "hft_bid_convexity"
    feature_type: "book_convexity"
    normalize: true
    domain: "hft"
    params:
      side: "bid"

  - name: "hft_ask_convexity"
    feature_type: "book_convexity"
    normalize: true
    domain: "hft"
    params:
      side: "ask"

  # =============================================================================
  # Order Book Slope Features (Price Elasticity)
  # =============================================================================

  - name: "hft_bid_slope"
    feature_type: "bid_ask_slope"
    normalize: true
    domain: "hft"
    params:
      side: "bid"
      levels: 5

  - name: "hft_ask_slope"
    feature_type: "bid_ask_slope"
    normalize: true
    domain: "hft"
    params:
      side: "ask"
      levels: 5

  # =============================================================================
  # Flow and Queue Features
  # =============================================================================

  - name: "hft_ofi"
    feature_type: "ofi"
    normalize: true
    domain: "hft"
    params:
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"
      bid_size_col: "bid_sz_00"
      ask_size_col: "ask_sz_00"

  - name: "hft_ofi_rolling_10"
    feature_type: "ofi_rolling"
    normalize: true
    domain: "hft"
    params:
      window: 10
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"
      bid_size_col: "bid_sz_00"
      ask_size_col: "ask_sz_00"

  - name: "hft_ofi_rolling_50"
    feature_type: "ofi_rolling"
    normalize: true
    domain: "hft"
    params:
      window: 50
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"
      bid_size_col: "bid_sz_00"
      ask_size_col: "ask_sz_00"

  - name: "hft_ofi_rolling_200"
    feature_type: "ofi_rolling"
    normalize: true
    domain: "hft"
    params:
      window: 200
      bid_price_col: "bid_px_00"
      ask_price_col: "ask_px_00"
      bid_size_col: "bid_sz_00"
      ask_size_col: "ask_sz_00"

  # Multi-level OFI — Cont, Kukanov & Stoikov (2014)
  - name: "hft_ofi_multilevel_3l"
    feature_type: "ofi_multilevel"
    normalize: true
    domain: "hft"
    params:
      levels: 3

  - name: "hft_ofi_multilevel_5l"
    feature_type: "ofi_multilevel"
    normalize: true
    domain: "hft"
    params:
      levels: 5

  - name: "hft_bid_queue_depletion"
    feature_type: "queue_depletion"
    normalize: true
    domain: "hft"
    params:
      side: "bid"
      bid_size_col: "bid_sz_00"

  - name: "hft_ask_queue_depletion"
    feature_type: "queue_depletion"
    normalize: true
    domain: "hft"
    params:
      side: "ask"
      ask_size_col: "ask_sz_00"

  - name: "hft_signed_trade_flow_50"
    feature_type: "signed_trade_flow"
    normalize: true
    domain: "hft"
    params:
      window: 50
      action_col: "action"
      side_col: "side"
      size_col: "size"

  - name: "hft_signed_trade_flow_200"
    feature_type: "signed_trade_flow"
    normalize: true
    domain: "hft"
    params:
      window: 200
      action_col: "action"
      side_col: "side"
      size_col: "size"

  # VPIN — Volume-synchronized Probability of Informed Trading (tick approximation)
  - name: "hft_vpin_100"
    feature_type: "vpin"
    normalize: true
    domain: "hft"
    params:
      window: 100
      action_col: "action"
      side_col: "side"
      size_col: "size"

  - name: "hft_vpin_500"
    feature_type: "vpin"
    normalize: true
    domain: "hft"
    params:
      window: 500
      action_col: "action"
      side_col: "side"
      size_col: "size"

  # Cancel-to-Trade Ratio — spoofing / adverse selection proxy
  - name: "hft_cancel_to_trade_200"
    feature_type: "cancel_to_trade_ratio"
    normalize: true
    domain: "hft"
    params:
      window: 200
      action_col: "action"

  - name: "hft_cancel_to_trade_1000"
    feature_type: "cancel_to_trade_ratio"
    normalize: true
    domain: "hft"
    params:
      window: 1000
      action_col: "action"

  # =============================================================================
  # Event-Time and Order Count Features
  # =============================================================================

  - name: "hft_inter_event_time"
    feature_type: "inter_event_time"
    normalize: true
    domain: "hft"

  - name: "hft_order_count_imbalance_l0"
    feature_type: "order_count_imbalance"
    normalize: true
    domain: "hft"
    params:
      level: 0

  - name: "hft_order_count_imbalance_l1"
    feature_type: "order_count_imbalance"
    normalize: true
    domain: "hft"
    params:
      level: 1

  # =============================================================================
  # Raw Price and Size Features (Best 3 Levels)
  # =============================================================================

  - name: "hft_bid_px_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_px_00"

  - name: "hft_ask_px_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_px_00"

  - name: "hft_bid_sz_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_sz_00"

  - name: "hft_ask_sz_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_sz_00"

  - name: "hft_bid_px_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_px_01"

  - name: "hft_ask_px_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_px_01"

  - name: "hft_bid_sz_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_sz_01"

  - name: "hft_ask_sz_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_sz_01"

  - name: "hft_bid_px_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_px_02"

  - name: "hft_ask_px_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_px_02"

  - name: "hft_bid_sz_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_sz_02"

  - name: "hft_ask_sz_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_sz_02"
