# High-Frequency Trading (HFT) baseline feature set
# =================================================
#
# This baseline assumes level-2 style order-book columns are available.
# All features are explicitly tagged as domain: "hft" so they are rejected
# when env.mode is set to "mft".
#
# Required columns:
#   bid_px_00..bid_px_09, ask_px_00..ask_px_09,
#   bid_sz_00..bid_sz_09, ask_sz_00..ask_sz_09

