# High-Frequency Trading (HFT) baseline feature set
# =================================================
#
# This baseline assumes level-2 style order-book columns are available.
# All features are explicitly tagged as domain: "hft" so they are rejected
# when env.mode is set to "mft".
#
# Required columns:
#   bid_px_00..bid_px_02, ask_px_00..ask_px_02,
#   bid_sz_00..bid_sz_02, ask_sz_00..ask_sz_02

features:
  - name: "hft_bid_px_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_px_00"

  - name: "hft_ask_px_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_px_00"

  - name: "hft_bid_sz_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_sz_00"

  - name: "hft_ask_sz_00"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_sz_00"

  - name: "hft_bid_px_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_px_01"

  - name: "hft_ask_px_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_px_01"

  - name: "hft_bid_sz_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_sz_01"

  - name: "hft_ask_sz_01"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_sz_01"

  - name: "hft_bid_px_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_px_02"

  - name: "hft_ask_px_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_px_02"

  - name: "hft_bid_sz_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "bid_sz_02"

  - name: "hft_ask_sz_02"
    feature_type: "column_value"
    normalize: true
    domain: "hft"
    params:
      column: "ask_sz_02"
