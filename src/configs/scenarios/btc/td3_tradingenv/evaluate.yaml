data:
  data_path: ./data/raw/synthetic/BTCUSDT_2023.parquet
  download_data: false
  train_size: 7000
env:
  backend: tradingenv
  trading_fees: 0.00035
  price_column: close
  reward_type: differential_sharpe
  reward_eta: 0.01
benchmarks:
  buy_and_hold: true
  short_and_hold: true
  twap: false
  vwap: false
  random: true
  n_random_trials: 10
statistical_testing:
  enabled: true
  tests:
  - t_test
  - sharpe_bootstrap
  - sortino_bootstrap
  - mann_whitney
  - permutation_test
  n_bootstrap_samples: 10000
  n_permutations: 10000
  confidence_level: 0.95
logging:
  log_level: INFO
