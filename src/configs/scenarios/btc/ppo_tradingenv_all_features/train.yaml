seed: 42
data:
  data_path: ./data/raw/synthetic/BTCUSDT_2023.parquet
  download_data: false
  exchange_names:
  - binance
  symbols:
  - BTC/USDT
  timeframe: 1h
  data_dir: data
  download_since: '2023-01-01T00:00:00+00:00'
  train_size: 7000
env:
  backend: tradingenv
  trading_fees: 0.00035
  price_column: close
  reward_type: differential_sharpe
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 128
  - 64
  value_hidden_dims:
  - 128
  - 64
training:
  algorithm: PPO
  actor_lr: 0.0003
  value_lr: 0.0003
  value_weight_decay: 2.0e-06
  actor_weight_decay: 2.0e-06
  max_steps: 5000000
  checkpoint_interval: 10000
  init_rand_steps: 5000
  frames_per_batch: 256
  optim_steps_per_batch: 40
  sample_size: 128
  buffer_size: 100000
  save_buffer: true
  gamma: 0.99
  clip_epsilon: 0.2
  entropy_bonus: 0.01
  vf_coef: 0.5
  ppo_epochs: 4
  loss_function: l2
  eval_steps: 720
  eval_interval: 1000
  log_interval: 100
logging:
  log_level: INFO
  save_plots: false
