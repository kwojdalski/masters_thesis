seed: 42
data:
  data_path: ./data/raw/synthetic/BTCUSDT_2023.parquet
  download_data: false
  exchange_names:
  - binance
  symbols:
  - BTC/USDT
  timeframe: 1h
  data_dir: data
  download_since: '2023-01-01T00:00:00+00:00'
  train_size: 7000
env:
  backend: tradingenv
  trading_fees: 0.0007
  price_column: close
  reward_type: log_return
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 64
  - 32
  value_hidden_dims:
  - 64
  - 32
training:
  algorithm: TD3
  actor_lr: 0.0003
  value_lr: 0.0003
  value_weight_decay: 1.0e-06
  actor_weight_decay: 1.0e-06
  max_steps: 2000000
  checkpoint_interval: 50000
  init_rand_steps: 2000
  frames_per_batch: 200
  optim_steps_per_batch: 3
  sample_size: 64
  buffer_size: 50000
  save_buffer: false
  gamma: 0.99
  tau: 0.005
  policy_noise: 0.1
  noise_clip: 0.3
  policy_delay: 2
  delay_actor: true
  delay_qvalue: true
  exploration_noise_std: 0.1
  loss_function: smooth_l1
  eval_steps: 720
  eval_interval: 500
  log_interval: 50
logging:
  log_level: INFO
  save_plots: false
