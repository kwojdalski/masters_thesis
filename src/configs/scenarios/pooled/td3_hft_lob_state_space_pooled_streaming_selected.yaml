# TD3 pooled streaming — IC/ICIR-selected feature subset (10 features)
# Feature set chosen by offline feature research on 18 training files;
# see logs/pooled_td3_hft_lob_state_space_pooled_streaming/feature_research/
# seed: 42  # Set to null/None for random results each run
data:
  # 18 training files: 6 symbols × 3 days (2026-02-25 to 2026-02-27)
  data_paths:
  - ./data/raw/stocks/daily/AAPL/AAPL_2026-02-25_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AAPL/AAPL_2026-02-26_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AAPL/AAPL_2026-02-27_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AMZN/AMZN_2026-02-25_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AMZN/AMZN_2026-02-26_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AMZN/AMZN_2026-02-27_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AVGO/AVGO_2026-02-25_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AVGO/AVGO_2026-02-26_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AVGO/AVGO_2026-02-27_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/META/META_2026-02-25_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/META/META_2026-02-26_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/META/META_2026-02-27_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/MSFT/MSFT_2026-02-25_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/MSFT/MSFT_2026-02-26_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/MSFT/MSFT_2026-02-27_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/TSLA/TSLA_2026-02-25_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/TSLA/TSLA_2026-02-26_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/TSLA/TSLA_2026-02-27_raw_mbp-10_us_hours.parquet
  # 6 validation files: last trading day (2026-03-02) per symbol
  val_data_paths:
  - ./data/raw/stocks/daily/AAPL/AAPL_2026-03-02_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AMZN/AMZN_2026-03-02_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/AVGO/AVGO_2026-03-02_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/META/META_2026-03-02_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/MSFT/MSFT_2026-03-02_raw_mbp-10_us_hours.parquet
  - ./data/raw/stocks/daily/TSLA/TSLA_2026-03-02_raw_mbp-10_us_hours.parquet
  data_path: ./data/raw/stocks/daily/AAPL/AAPL_2026-02-25_raw_mbp-10_us_hours.parquet
  feature_config: src/configs/features/hft_lob_features_all.yaml
  download_data: false
  train_size: 50000
  lazy_load: true
  prepared_data_dir: ./data/prepared/pooled_daily_6sym_selected
  memmap_dir: ./data/memmap/pooled_daily_6sym_selected
  feature_cache_dir: ".cache/feature_transformation"
  filter_lob_levels: 5
env:
  backend: tradingenv
  mode: hft
  trading_fees: 0.0
  price_column: close
  include_position_feature: true
  streaming_episode_length: 50000
  feature_columns:
  - feature_hft_book_pressure_l0
  - feature_hft_order_book_imbalance_3l
  - feature_hft_order_count_imbalance_l0
  - feature_hft_microprice
  - feature_hft_microprice_divergence
  - feature_hft_bid_slope
  - feature_hft_ask_slope
  - feature_hft_ofi
  - feature_hft_ofi_rolling_50
  - feature_hft_signed_trade_flow_50
  - feature_position
  obs_clip: 5.0
  reward_type: differential_sharpe
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 128
  - 64
  value_hidden_dims:
  - 128
  - 64
training:
  algorithm: TD3
  temp_eval_interval: 100000
  actor_lr: 0.0001
  value_lr: 0.0001
  value_weight_decay: 2.0e-06
  actor_weight_decay: 2.0e-06
  max_steps: 2000000
  checkpoint_interval: 100000
  init_rand_steps: 1000
  frames_per_batch: 200
  optim_steps_per_batch: 5
  sample_size: 128
  buffer_size: 100000
  save_buffer: true
  gamma: 0.995
  tau: 0.001
  policy_noise: 0.2
  noise_clip: 0.3
  policy_delay: 2
  delay_actor: true
  delay_qvalue: true
  exploration_noise_std: 0.1
  loss_function: smooth_l1
  eval_fraction: 0.2  # 20% of the validation split, regardless of tick density
  eval_interval: 1000
  log_interval: 100
logging:
  log_level: INFO
  save_plots: false
explainability:
  enabled: true
  n_steps: 500
  methods:
    - permutation
  temp_explainability_interval: 100000
statistical_testing:
  enabled: false
  log_to_research_artifacts: true
  compare_to_buy_and_hold: true
  compare_to_short_and_hold: true
  compare_to_twap: true
  compare_to_vwap: true
  compare_to_random: true
  tests:
  - t_test
  - sharpe_bootstrap
  - sortino_bootstrap
  - mann_whitney
  - n_bootstrap_samples: 10000
  n_random_trials: 10
  confidence_level: 0.95
  random_seed: 42
