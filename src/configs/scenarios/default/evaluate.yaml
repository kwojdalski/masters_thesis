# Evaluation config for the default scenario.
# Contains only what the evaluate command needs: data splits, env, and stat tests.
# Network architecture and training hyperparameters come from the checkpoint.

data:
  data_path: "./data/raw/binance/binance-BTCUSDT-1h.parquet"
  download_data: false
  train_size: 1000

env:
  mode: "mft"
  positions: [-1, 0, 1]
  trading_fees: 0.0
  borrow_interest_rate: 0.0
  backend: "gym_anytrading.forex"
  reward_type: "log_return"
  reward_eta: 0.01

statistical_testing:
  enabled: true
  compare_to_buy_and_hold: true
  compare_to_short_and_hold: false
  compare_to_twap: false
  compare_to_vwap: false
  compare_to_random: true
  tests:
    - "t_test"
    - "sharpe_bootstrap"
    - "sortino_bootstrap"
    - "mann_whitney"
    - "permutation_test"
  n_bootstrap_samples: 10000
  n_permutations: 10000
  confidence_level: 0.95

logging:
  log_level: "INFO"
