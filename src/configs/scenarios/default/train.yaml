seed: null
data:
  data_path: ./data/raw/binance/binance-BTCUSDT-1h.parquet
  download_data: false
  train_size: 1000
env:
  positions:
  - -1
  - 0
  - 1
  trading_fees: 0.0
  borrow_interest_rate: 0.0
  backend: gym_anytrading.forex
  reward_type: log_return
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 64
  - 32
  value_hidden_dims:
  - 64
  - 32
  - 16
training:
  algorithm: DDPG
  actor_lr: 0.0001
  actor_weight_decay: 0
  value_lr: 0.001
  value_weight_decay: 0.01
  max_steps: 5000
  init_rand_steps: 50
  frames_per_batch: 200
  optim_steps_per_batch: 50
  sample_size: 50
  buffer_size: 100000
  tau: 0.001
  loss_function: l2
  eval_steps: 500
  eval_interval: 200
  log_interval: 50
logging:
  log_level: INFO
explainability:
  enabled: false
  n_steps: 500
  methods:
  - permutation
  - integrated_gradients
  temp_explainability_interval: null
