# TD3 Configuration for AAPL with HFT/LOB Features
# ============================================================================
# This scenario uses high-frequency trading features from Level-2 order book data.
# Uses raw MBP-10 (Market by Price, 10 levels) data from Databento for AAPL.
#
# Data: Tick-level order book snapshots with bid/ask prices and sizes at 10 levels
# Backend: TradingEnv (supports continuous actions)
# Algorithm: TD3 (Twin Delayed Deep Deterministic Policy Gradient)
# Features: LOB microstructure features including:
#   - Book pressure (volume imbalances at L0-L2)
#   - Microprice and microprice divergence
#   - Spread in basis points
#   - Multi-level order book imbalance
#   - Depth ratio and VWMP skew
#   - Bid/ask slopes (price elasticity)
#   - Raw prices and sizes (L0-L2)

seed: 42

# Data Configuration
data:
  data_path: "./data/raw/stocks/AAPL_2026-02-25_2026-02-27_raw_mbp-10_us_hours.parquet"
  # data_path: "./data/raw/stocks/AAPL_2026-02-25_2026-02-27_raw_mbp-10_small.parquet"
  feature_config: "src/configs/features/hft_lob_features.yaml"
  download_data: false
  train_size: 15000  # ~2M ticks for training (filtered to US market hours 9:30 AM - 4:00 PM EST)

# Environment Configuration - TradingEnv Backend
env:
  name: "TRADINGENV_TD3_AAPL_HFT"
  backend: "tradingenv"
  mode: "hft"  # Enable HFT mode to accept HFT domain features

  # Transaction costs (HFT typically has very low fees)
  trading_fees: 0.000  # 1 basis point

  # Price column for environment pricing/PnL
  # Using mid price from best bid/ask
  price_column: "close"  # or we could compute mid: (bid_px_00 + ask_px_00) / 2

  # HFT/LOB microstructure features (22 features)
  feature_columns: [
    # Book pressure features (3)
    "feature_hft_book_pressure_l0",
    "feature_hft_book_pressure_l1",
    "feature_hft_book_pressure_l2",
    # Microprice features (2)
    "feature_hft_microprice",
    "feature_hft_microprice_divergence",
    # Spread and cost (1)
    "feature_hft_spread_bps",
    # Order book depth features (3)
    "feature_hft_order_book_imbalance_3l",
    "feature_hft_depth_ratio",
    "feature_hft_vwmp_skew",
    # Slope features (2)
    "feature_hft_bid_slope",
    "feature_hft_ask_slope",
    # Raw prices and sizes L0-L2 (12)
    "feature_hft_bid_px_00",
    "feature_hft_ask_px_00",
    "feature_hft_bid_sz_00",
    "feature_hft_ask_sz_00",
    "feature_hft_bid_px_01",
    "feature_hft_ask_px_01",
    "feature_hft_bid_sz_01",
    "feature_hft_ask_sz_01",
    "feature_hft_bid_px_02",
    "feature_hft_ask_px_02",
    "feature_hft_bid_sz_02",
    "feature_hft_ask_sz_02",
  ]

  reward_type: "differential_sharpe"
  reward_eta: 0.01

# Network Architecture
# Smaller networks for faster training on high-frequency data
network:
  actor_hidden_dims: [128, 64]
  value_hidden_dims: [128, 64]

# Training Parameters - TD3
training:
  algorithm: "TD3"
  temp_eval_interval: 100000

  # Learning rates
  actor_lr: 0.0001
  value_lr: 0.0001
  value_weight_decay: 0.000002
  actor_weight_decay: 0.000002

  # Training loop
  max_steps: 2000000  # 2M steps for HFT data
  checkpoint_interval: 100000
  init_rand_steps: 1000  # More random exploration initially
  frames_per_batch: 200
  optim_steps_per_batch: 5
  sample_size: 128
  buffer_size: 100000
  save_buffer: true

  # Discount factor
  gamma: 0.99

  # TD3-specific parameters
  tau: 0.001  # Soft update rate
  policy_noise: 0.2  # Noise added to target policy
  noise_clip: 0.3  # Clipping range for policy noise
  policy_delay: 2  # Delay actor/critic updates
  delay_actor: true
  delay_qvalue: true
  exploration_noise_std: 0.2  # Exploration noise

  # Loss function
  loss_function: "smooth_l1"

  # Evaluation
  eval_steps: 720  # ~1 day of trading at 1min intervals
  eval_interval: 1000
  log_interval: 100

# Logging Configuration
logging:
  log_level: "INFO"
  save_plots: false

# Explainability Configuration
explainability:
  enabled: true
  n_steps: 500
  methods: ["permutation", "integrated_gradients"]
  temp_explainability_interval: 100000  # Run every 100k steps

# Statistical Significance Testing Configuration
statistical_testing:
  enabled: true  # Enable statistical testing of equity curves
  log_to_research_artifacts: true  # Also log compact statistical summaries to MLflow research_artifacts
  research_artifact_subdir: "research_artifacts/statistical_tests"

  # Comparison baselines
  compare_to_buy_and_hold: true  # Compare strategy to buy-and-hold benchmark
  compare_to_random: true  # Compare strategy to random action baseline

  # Statistical tests to perform
  tests:
    - "t_test"  # Two-sample t-test for mean returns
    - "sharpe_bootstrap"  # Bootstrap test for Sharpe ratio significance
    - "sortino_bootstrap"  # Bootstrap test for Sortino ratio (downside risk only, more robust)
    - "mann_whitney"  # Mann-Whitney U test (non-parametric)
    - "permutation_test"  # Permutation test (distribution-free)

  # Test parameters
  n_bootstrap_samples: 10000  # Bootstrap iterations for ratio tests
  n_permutations: 10000  # Permutations for permutation test
  n_random_trials: 100  # Number of random baseline trials
  confidence_level: 0.95  # Confidence level (95% CI)
  random_seed: 42  # Seed for reproducible random baseline
