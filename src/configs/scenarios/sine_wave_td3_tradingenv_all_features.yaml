# TD3 Configuration with TradingEnv Backend (XAI Asset Management Library)
# ========================================================================
# This configuration uses the tradingenv library for continuous portfolio allocation
# with TD3 (Twin Delayed DDPG) algorithm
# https://github.com/xaiassetmanagement/tradingenv

experiment_name: "td3_tradingenv_sine_all_features"
seed: 42

# Data Configuration
data:
  data_path: "./data/raw/synthetic/sine_wave_ppo_no_trend.parquet"
  data_config: "src/configs/data/sine_wave_large.yaml"  # Config for regenerating data
  feature_config: "src/configs/features/all_features.yaml"  # Config for feature engineering
  download_data: false
  exchange_names: ["synthetic"]
  symbols: ["SINE/WAVE"]
  timeframe: "1h"
  data_dir: "data"
  download_since: "2024-01-01T00:00:00+00:00"
  train_size: 450  # Match current local sine-wave dataset size (~500 rows)
  no_features: false

# Environment Configuration - TradingEnv Backend
env:
  name: "TRADINGENV_TD3_SINE_ALL_FEATURES"
  backend: "tradingenv"

  # Transaction costs
  trading_fees: 0.001  # Synthetic benchmark setup (same as sine-wave baseline)

  # Column specifications - IMPORTANT: price_columns must contain only positive values
  price_columns: ["close"]  # Columns to use as asset prices (OHLC data)
  feature_columns: [
    "feature_log_return",
    "feature_high",
    "feature_low",
    "feature_trend",
    "feature_simple_return",
    "feature_rsi",
    "feature_return_lag_1",
    "feature_log_volume",
    "feature_volume_change",
    "feature_volume_ma_ratio_20",
    "feature_amihud_illiquidity",
    "feature_realized_volatility_20",
    "feature_volatility_ratio_5_60",
    "feature_hour_sin",
    "feature_hour_cos",
    "feature_day_of_week_sin",
    "feature_day_of_week_cos",
    "feature_minute_of_hour_sin",
    "feature_minute_of_hour_cos",
    "feature_sma_20",
    "feature_ema_20",
    "feature_wma_20",
    "feature_dema_20",
    "feature_tema_20",
    "feature_talib_rsi_14",
    "feature_macd_12_26_9",
    "feature_mom_10",
    "feature_roc_10",
    "feature_cmo_14",
    "feature_willr_14",
    "feature_cci_14",
    "feature_atr_14",
    "feature_natr_14",
    "feature_bbands_20",
    "feature_obv",
    "feature_ad",
    "feature_adosc_3_10",
    "feature_adx_14",
    "feature_aroon_14",
  ]  # All engineered features from all_features.yaml

  # Reward function configuration
  reward_type: "differential_sharpe"  # Use Differential Sharpe Ratio for risk-adjusted rewards
  reward_eta: 0.01  # Learning rate for DSR exponential moving averages (0.001 to 0.1)

  # Note: positions parameter is not used with tradingenv backend
  # Actions are continuous portfolio weights instead of discrete positions

# Network Architecture
network:
  actor_hidden_dims: [128, 64]  # Larger network for better pattern learning (was [64, 32])
  value_hidden_dims: [128, 64]  # Larger critics for stable Q-value estimation (was [64, 32])

# Training Parameters - TD3
training:
  algorithm: "TD3"  # Twin Delayed DDPG - off-policy actor-critic

  # Learning rates - CRITICAL: Reduced for stability
  actor_lr: 0.0001  # Reduced from 0.0003 to prevent Q-value explosions
  value_lr: 0.0001  # Reduced from 0.0003 for more conservative updates
  value_weight_decay: 0.000002
  actor_weight_decay: 0.000002
  # Training loop
  max_steps: 250000  # 5x longer run for deeper convergence testing on sine-wave
  checkpoint_interval: 10000
  init_rand_steps: 2000  # Match sine-wave TD3 baseline exploration warm-up
  frames_per_batch: 200
  optim_steps_per_batch: 5  # CRITICAL: Prevents overfitting to small batches
  sample_size: 128  # Increased from 64 for more stable gradient estimates
  buffer_size: 50000  # Match synthetic training horizon
  save_buffer: true  # Set to true to save replay buffer in checkpoint (increases file size ~10-100x)

  # Discount factor
  gamma: 0.99  # Discount factor for future rewards

  # TD3-specific parameters
  tau: 0.001  # CRITICAL: Slower target updates (was 0.005) for more stable targets
  policy_noise: 0.2  # CRITICAL: Further reduced (was 0.05) for cleaner learning signal
  noise_clip: 0.3  # Reduced from 0.5 - tighter noise bounds
  policy_delay: 2  # Frequency of delayed policy updates
  delay_actor: true  # Enable delayed actor updates
  delay_qvalue: true  # Enable delayed Q-value updates
  exploration_noise_std: 0.2  # CRITICAL: Reduced from 0.05 for less random exploration


  # Loss function
  loss_function: "smooth_l1"  # CRITICAL: More stable than l2 for TD learning

  # Evaluation
  eval_steps: 440  # Match sine-wave validation/test scale
  eval_interval: 500  # More frequent checks for shorter runs
  log_interval: 100  # Reduced from 200 for more frequent monitoring

# Logging Configuration
logging:
  log_dir: "logs/td3_tradingenv_sine_all_features"
  log_level: "INFO"
  save_plots: false  # Save training plots to disk in addition to MLflow
