# TD3 Configuration with Minimal Features (Baseline)
# ====================================================
# Ultra-minimal 8 features for fast baseline experiments
# Use this to verify RL works before trying optimized set

seed: 42

# Data Configuration
data:
  data_path: "./data/raw/synthetic/BTCUSDT_2023.parquet"
  feature_config: "src/configs/features/btc_minimal_features.yaml"  # ← MINIMAL
  download_data: false
  exchange_names: ["binance"]
  symbols: ["BTC/USDT"]
  timeframe: "1h"
  data_dir: "data"
  download_since: "2023-01-01T00:00:00+00:00"
  train_size: 7000

# Environment Configuration
env:
  name: "TRADINGENV_TD3_BTC_MINIMAL"
  backend: "tradingenv"

  trading_fees: 0.0007

  price_columns: ["close"]
  feature_columns: [
    # Returns (3)
    "feature_log_return",
    "feature_return_lag_24",
    "feature_return_lag_168",
    # Volatility (1)
    "feature_realized_volatility_24",
    # Volume (1)
    "feature_volume_ma_ratio_24",
    # Technical (1)
    "feature_rsi_14",
    # Temporal (2)
    "feature_hour_sin",
    "feature_hour_cos",
  ]

  reward_type: "log_return"
  reward_eta: 0.01

# Network Architecture (smaller for 8 features)
network:
  actor_hidden_dims: [64, 32]
  value_hidden_dims: [64, 32]

# Training Parameters - TD3
training:
  algorithm: "TD3"

  # Learning rates
  actor_lr: 0.0003  # Higher LR for faster convergence with minimal features
  value_lr: 0.0003
  value_weight_decay: 0.000001
  actor_weight_decay: 0.000001

  # Training loop (shorter for baseline)
  max_steps: 2000000  # Reduced for faster baseline
  checkpoint_interval: 50000
  init_rand_steps: 2000
  frames_per_batch: 200
  optim_steps_per_batch: 3
  sample_size: 64
  buffer_size: 50000
  save_buffer: false

  # Discount factor
  gamma: 0.99

  # TD3-specific
  tau: 0.005  # Faster target updates for minimal features
  policy_noise: 0.1
  noise_clip: 0.3
  policy_delay: 2
  delay_actor: true
  delay_qvalue: true
  exploration_noise_std: 0.1

  # Loss function
  loss_function: "smooth_l1"

  # Evaluation
  eval_steps: 720
  eval_interval: 500
  log_interval: 50

# Logging Configuration
logging:
  log_level: "INFO"
  save_plots: false
