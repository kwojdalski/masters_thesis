data:
  data_path: ./data/raw/synthetic/sine_wave_ppo_no_trend.parquet
  data_config: src/configs/data/sine_wave_standard.yaml
  download_data: false
  train_size: 450
env:
  positions:
  - -1
  - 1
  trading_fees: 0.0
  borrow_interest_rate: 0.0
  backend: gym_trading_env.continuous
  reward_type: log_return
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 64
  - 32
  value_hidden_dims:
  - 64
  - 32
training:
  algorithm: TD3
  actor_lr: 0.0003
  actor_weight_decay: 0
  value_lr: 0.002
  value_weight_decay: 1.0e-05
  max_steps: 15000
  init_rand_steps: 100
  frames_per_batch: 200
  optim_steps_per_batch: 40
  sample_size: 64
  buffer_size: 10000
  tau: 0.005
  policy_noise: 0.2
  noise_clip: 0.5
  delay_actor: true
  delay_qvalue: true
  loss_function: l2
  eval_steps: 350
  eval_interval: 120
  log_interval: 40
logging:
  log_level: INFO
