seed: 99
data:
  data_path: ./data/raw/synthetic/sine_wave_ppo_trend.parquet
  data_config: src/configs/data/sine_wave_with_trend.yaml
  download_data: false
  exchange_names:
  - synthetic
  symbols:
  - SINE/WAVE
  timeframe: 1h
  data_dir: data
  download_since: '2024-01-01T00:00:00+00:00'
  train_size: 450
env:
  positions:
  - -1
  - 0
  - 1
  trading_fees: 0.0
  borrow_interest_rate: 0.0
  backend: gym_anytrading.forex
  reward_type: log_return
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 32
  - 16
  value_hidden_dims:
  - 32
  - 16
training:
  algorithm: PPO
  actor_lr: 0.0003
  actor_weight_decay: 0
  value_lr: 0.0003
  value_weight_decay: 0.001
  max_steps: 80000
  init_rand_steps: 10
  frames_per_batch: 200
  optim_steps_per_batch: 40
  sample_size: 64
  buffer_size: 4000
  clip_epsilon: 0.2
  entropy_bonus: 0.1
  vf_coef: 0.5
  ppo_epochs: 4
  loss_function: l2
  eval_steps: 350
  eval_interval: 120
  log_interval: 40
logging:
  log_level: INFO
