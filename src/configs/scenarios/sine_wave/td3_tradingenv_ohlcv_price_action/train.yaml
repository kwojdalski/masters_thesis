seed: 42
data:
  data_path: ./data/raw/synthetic/sine_wave_ppo_no_trend.parquet
  data_config: src/configs/data/sine_wave_large.yaml
  download_data: false
  exchange_names:
  - synthetic
  symbols:
  - SINE/WAVE
  timeframe: 1h
  data_dir: data
  download_since: '2024-01-01T00:00:00+00:00'
  train_size: 450
env:
  backend: tradingenv
  trading_fees: 0.001
  price_column: close
  reward_type: log_return
  reward_eta: 0.01
network:
  actor_hidden_dims:
  - 128
  - 64
  value_hidden_dims:
  - 128
  - 64
training:
  algorithm: TD3
  actor_lr: 0.0001
  value_lr: 0.0001
  value_weight_decay: 2.0e-06
  actor_weight_decay: 2.0e-06
  max_steps: 2500000
  checkpoint_interval: 10000
  init_rand_steps: 2000
  frames_per_batch: 200
  optim_steps_per_batch: 5
  sample_size: 128
  buffer_size: 50000
  save_buffer: true
  gamma: 0.99
  tau: 0.005
  policy_noise: 0.2
  noise_clip: 0.3
  policy_delay: 2
  delay_actor: true
  delay_qvalue: true
  exploration_noise_std: 0.2
  loss_function: smooth_l1
  eval_steps: 440
  eval_interval: 500
  log_interval: 100
logging:
  log_level: INFO
  save_plots: false
