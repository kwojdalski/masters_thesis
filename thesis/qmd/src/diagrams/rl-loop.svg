<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200"
     font-family="Georgia, serif" font-size="15">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="black"/>
    </marker>
  </defs>

  <!-- Agent box -->
  <rect x="180" y="20" width="160" height="50" rx="8" ry="8"
        fill="white" stroke="black" stroke-width="1.5"/>
  <text x="260" y="51" text-anchor="middle" font-size="16">Agent</text>

  <!-- Environment box -->
  <rect x="180" y="130" width="160" height="50" rx="8" ry="8"
        fill="white" stroke="black" stroke-width="1.5"/>
  <text x="260" y="161" text-anchor="middle" font-size="16">Environment</text>

  <!-- Right arrow: Agent.east → right column → Environment.east (action) -->
  <polyline points="340,45 440,45 440,155 340,155"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#arrow)"/>
  <text x="452" y="90" text-anchor="start" font-size="13">action</text>
  <text x="452" y="110" text-anchor="start" font-size="13" font-style="italic">A<tspan dy="3" font-size="10">t</tspan></text>

  <!-- Left arrow: Environment.west → left column → Agent.west (state + reward) -->
  <polyline points="180,155 80,155 80,45 180,45"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#arrow)"/>
  <!-- State label (top-left, near agent) -->
  <text x="68" y="37" text-anchor="end" font-size="13">state</text>
  <text x="68" y="55" text-anchor="end" font-size="13" font-style="italic">S<tspan dy="3" font-size="10">t</tspan></text>
  <!-- Reward label (mid-left, along the arrow) -->
  <text x="68" y="108" text-anchor="end" font-size="13">reward</text>
  <text x="68" y="126" text-anchor="end" font-size="13" font-style="italic">R<tspan dy="3" font-size="10">t</tspan></text>

  <!-- Dashed divider inside Environment box -->
  <line x1="228" y1="131" x2="228" y2="179"
        stroke="black" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Next-step labels -->
  <text x="233" y="149" font-size="11" font-style="italic">
    R<tspan dy="2" font-size="8">t+1</tspan>
  </text>
  <text x="233" y="168" font-size="11" font-style="italic">
    S<tspan dy="2" font-size="8">t+1</tspan>
  </text>
</svg>
